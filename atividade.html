<html>
<head>
<meta charset="UTF-8">
<title>Ficha de Inscrição</title>
</head>

<body>

<h2 align="center">Ficha de Inscrição</h2>

<form>

<table border="1" align="center" cellpadding="5">

<tr>
<td>Nome do candidato:</td>
<td colspan="5"><input type="text" size="60"></td>
</tr>

<tr>
<td>Endereço:</td>
<td colspan="5"><input type="text" size="60"></td>
</tr>

<tr>
<td>CEP:</td>
<td><input type="text" size="10"></td>

<td>Cidade:</td>
<td>
<select>
<option>-- Cidade --</option>
<option>São Paulo</option>
<option>Rio de Janeiro</option>
<option>Brasília</option>
</select>
</td>

<td>UF:</td>
<td>
<select>
<option>-- UF --</option>
<option>SP</option>
<option>RJ</option>
<option>DF</option>
<option>MG</option>
</select>
</td>
</tr>

<tr>
<td>Telefone:</td>
<td><input type="text" size="10"></td>
<td><input type="text" size="10"></td>
<td><input type="text" size="10"></td>
<td colspan="2"></td>
</tr>

<tr>
<td>RG:</td>
<td><input type="text"></td>

<td>CPF:</td>
<td><input type="text"></td>

<td>Sexo:</td>
<td>
<input type="radio" name="sexo"> Mas.
<input type="radio" name="sexo"> Fem.
</td>
</tr>

<tr>
<td>Escolaridade:</td>
<td>
<select>
<option>-- Selecione --</option>
<option>Ensino Médio</option>
<option>Ensino Técnico</option>
<option>Ensino Superior</option>
</select>
</td>

<td>Email:</td>
<td colspan="3"><input type="email" size="30"></td>
</tr>

<tr>
<td>Curso:</td>
<td>
<select>
<option>-- Selecione --</option>
<option>Engenharia de Software</option>
<option>Sistemas de Informação</option>
<option>Análise e Desenvolvimento</option>
</select>
</td>

<td>Senha de acompanhamento:</td>
<td colspan="3"><input type="password"></td>
</tr>

<tr>
<td colspan="6" align="center">
<input type="submit" value="CADASTRAR">
</td>
</tr>

</table>

</form>

</body>
</html>
